services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artemis_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/workspace/app
      - ./alembic:/workspace/alembic
      - ./alembic.ini:/workspace/alembic.ini
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: artemis_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: artemis_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - web

  grafana:
    image: grafana/grafana-oss:latest
    container_name: artemis_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
